{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-debug-dashboard.fullname" . }}
  labels:
    {{- include "node-debug-dashboard.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - events
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes/proxy
      - nodes/metrics
      - nodes/stats
    verbs: ["get"]
{{- end -}}
