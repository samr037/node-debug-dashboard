# Default values for node-debug-dashboard.

image:
  repository: ghcr.io/samr037/node-debug-dashboard
  # tag defaults to .Chart.AppVersion if unset
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Host port for the dashboard / REST API (uses hostNetwork).
httpPort: 80

# SSH debug shell. Off by default. To enable, set ssh.enabled=true and
# pass keys via ssh.authorizedKeys.
ssh:
  enabled: false
  port: 2022
  passwordAuth: false
  # Newline-separated public keys, e.g.:
  #   ssh-ed25519 AAAA... user@host
  #   ssh-rsa AAAA... other@host
  authorizedKeys: ""

# Required for hardware, Kubernetes, and etcd diagnostics.
hostNetwork: true
hostPID: true
hostIPC: true
privileged: true

# Mount host / at /host. Required for SMART, sensors, EFI, Talos bits.
hostRootMount: true

# Read-only access on nodes, pods, services, endpoints, events.
# Used by the Kubernetes section and kdiag-* scripts.
serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

# Run on every node by default.
tolerations:
  - operator: Exists

nodeSelector: {}
affinity: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

priorityClassName: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
