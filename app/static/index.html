<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Debug Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='4' width='28' height='20' rx='3' fill='%230d1117' stroke='%2339d4e9' stroke-width='2'/><text x='16' y='18' text-anchor='middle' font-family='monospace' font-size='10' fill='%2339d4e9'>N</text><rect x='12' y='26' width='8' height='2' rx='1' fill='%2339d4e9'/></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-title">Node Debug Dashboard</span>
            <span class="header-node" id="header-node">Loading...</span>
        </div>
        <div class="header-right">
            <div class="theme-toggle" id="theme-toggle">
                <button data-theme="auto" title="Follow OS preference">Auto</button>
                <button data-theme="light" title="Light theme">Light</button>
                <button data-theme="dark" title="Dark theme">Dark</button>
            </div>
            <span>Refresh: <span id="countdown">10s</span></span>
            <button class="refresh-btn" id="refresh-btn">Refresh Now</button>
        </div>
    </div>

    <div class="cluster-bar" id="cluster-bar"></div>

    <div class="node-bar" id="node-bar">
        <div class="loading"><span class="spinner"></span>Loading node info...</div>
    </div>

    <div class="main">
        <div id="warnings-section" class="warnings-banner all-ok">
            <div class="loading"><span class="spinner"></span>Loading...</div>
        </div>
        <div id="hardware-section"></div>
        <div id="storage-section"></div>
        <div id="system-section"></div>
        <div id="network-section"></div>
        <div id="kubernetes-section"></div>
        <div id="talos-section"></div>
        <div id="containers-section"></div>
        <div id="processes-section"></div>
    </div>

    <!-- Log viewer modal (outside .main so auto-refresh doesn't destroy it) -->
    <div id="log-modal" class="log-modal hidden">
        <div class="log-modal-header">
            <span id="log-modal-title">Container Logs</span>
            <button id="log-modal-close" class="refresh-btn">Close</button>
        </div>
        <pre id="log-modal-content" class="log-content"></pre>
    </div>

    <div class="footer">
        <div>
            <a href="/docs" target="_blank">API Docs (Swagger)</a>
            &nbsp;|&nbsp;
            <a href="/api/overview" target="_blank">Raw JSON</a>
        </div>
        <div id="status">Connecting...</div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
